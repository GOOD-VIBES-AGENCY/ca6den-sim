<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CA6DEN 沖縄出店 — 投資家向けシミュレーション</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2557;--navy2:#1b3a7a;--gold:#b8860b;--gold2:#d4a017;
  --green:#15803d;--red:#b91c1c;--blue:#1d4ed8;--purple:#6d28d9;
  --gray:#64748b;--lightgray:#f1f4f9;--border:#dde3ef;--text:#1a1f2e;
}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f2f6;color:var(--text);font-size:14px;min-height:100vh}
button{cursor:pointer;font-family:'Noto Sans JP',sans-serif}
input[type=range]{width:100%;cursor:pointer;accent-color:var(--navy)}
table{border-collapse:collapse;width:100%}

/* ── ヘッダー ── */
#hdr{background:var(--navy);color:#fff;padding:20px 32px;border-bottom:4px solid var(--gold)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.hdr-label{font-size:10px;letter-spacing:.2em;color:#8aaad8;margin-bottom:6px;font-weight:500}
.hdr-title{font-size:20px;font-weight:900;line-height:1.3}
.hdr-sub{font-size:11px;color:#7a9dc8;margin-top:6px;line-height:1.6}
.hdr-right{text-align:right;flex-shrink:0}
.hdr-date{font-size:11px;color:#8aaad8;margin-bottom:6px}
.badge-conf{background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:3px 12px;letter-spacing:.08em;display:inline-block}

/* ── 投資金額バー ── */
#invbar{background:#f0f4ff;border-bottom:2px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.inv-lbl{font-size:11px;font-weight:700;color:var(--navy);white-space:nowrap}
.inv-btn{padding:6px 18px;font-size:13px;font-weight:700;border:2px solid #b0bcd4;background:#fff;color:var(--navy);border-radius:4px;cursor:pointer;transition:all .15s}
.inv-btn.on{border-color:#0f2557;background:#0f2557;color:#fff}
.inv-note{font-size:10px;color:var(--gray);margin-left:8px}
/* ── シナリオバー ── */
#scbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sc-lbl{font-size:11px;font-weight:700;color:var(--gray);white-space:nowrap}
.sc-btn{padding:7px 16px;font-size:12px;font-weight:700;border:2px solid var(--border);background:#fff;color:var(--gray);border-radius:4px;transition:all .15s}
.sc-btn.on{border-color:var(--sc,var(--navy));background:var(--sc,var(--navy));color:#fff}
.sc-note-text{font-size:11px;color:var(--gray);margin-left:4px}

/* ── タブ ── */
#tabbar{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 32px;overflow-x:auto;-webkit-overflow-scrolling:touch}
#tabbar::-webkit-scrollbar{display:none}
.tab-btn{padding:14px 18px;font-size:12px;font-weight:600;background:none;border:none;color:var(--gray);border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0}
.tab-btn.on{color:var(--navy);border-bottom-color:var(--navy)}

/* ── メイン ── */
#main{padding:28px 32px;max-width:1080px;margin:0 auto}
.section{margin-bottom:28px}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sec-no{font-size:22px;font-weight:900;color:var(--gold);line-height:1;min-width:36px}
.sec-title{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:.06em;border-bottom:2px solid var(--navy);padding-bottom:6px;flex:1}

/* ── カード ── */
.card{background:#fff;border-radius:8px;box-shadow:0 1px 6px rgba(15,37,87,.08);padding:22px 24px}
.card-ttl{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.08em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:#fff;border-radius:8px;box-shadow:0 1px 6px rgba(15,37,87,.08);padding:16px 18px;border-top:3px solid var(--ac,var(--navy))}
.kpi-lbl{font-size:10px;color:var(--gray);font-weight:600;letter-spacing:.04em;margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:900;color:var(--ac,var(--navy));line-height:1}
.kpi-sub{font-size:10px;color:#9aa5be;margin-top:5px;line-height:1.5}

/* ── テーブル ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;box-shadow:0 1px 6px rgba(15,37,87,.08)}
.dtbl th{background:var(--navy);color:#fff;padding:10px 14px;font-size:11px;font-weight:700;text-align:right;white-space:nowrap;border-right:1px solid var(--navy2)}
.dtbl th.L{text-align:left}
.dtbl td{padding:9px 14px;font-size:12px;border-bottom:1px solid var(--border);border-right:1px solid #eef0f6;text-align:right;background:#fff}
.dtbl td.L{text-align:left}
.dtbl tr:nth-child(even) td{background:#f8f9fd}
.dtbl tr:hover td{background:#eef2ff}

/* ── PL表 ── */
.pl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.pltbl td{padding:6px 12px;font-size:12px;border-bottom:1px solid #f0f2f8}
.pltbl td.L{text-align:left}
.pltbl td.R{text-align:right}
.pltbl .pl-bold td{font-weight:700;background:#eef1f8}
.pltbl .pl-result td{font-weight:700;font-size:14px;background:#e8f0e8}
.pltbl .pl-sh{font-size:10px;color:var(--gray);margin-left:6px}
.pl-subhd td{background:#e4e9f5;font-size:10px;font-weight:700;color:var(--navy);letter-spacing:.06em;padding:5px 12px}

/* ── グリッド ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.gpl{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
.merit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── メリットカード ── */
.merit-card{background:#fff;border-radius:8px;box-shadow:0 1px 6px rgba(15,37,87,.08);padding:20px;border-top:3px solid var(--mc,var(--navy))}
.merit-no{font-size:28px;font-weight:900;color:var(--mc,var(--navy));line-height:1;margin-bottom:8px}
.merit-ttl{font-size:13px;font-weight:700;color:var(--mc,var(--navy));margin-bottom:8px}
.merit-body{font-size:11px;color:#4a5a7a;line-height:1.85}

/* ── スライダー ── */
.sl-group{margin-bottom:12px}
.sl-row{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:3px}
.sl-val{font-weight:700;color:var(--navy)}
.seg{display:flex;gap:6px;margin-bottom:10px}
.seg-btn{flex:1;padding:8px 0;font-size:12px;font-weight:700;border:2px solid var(--border);background:#fff;color:var(--gray);border-radius:4px}
.seg-btn.on{border-color:var(--navy);background:var(--navy);color:#fff}

/* ── チャート ── */
.chart-legend{display:flex;gap:20px;font-size:11px;color:var(--gray);margin-bottom:8px;flex-wrap:wrap}
.leg-line{width:22px;height:3px;display:inline-block;vertical-align:middle;margin-right:5px;border-radius:2px}

/* ── ユーティリティ ── */
.pos{color:var(--green)} .neg{color:var(--red)} .navy{color:var(--navy)}
.gold{color:var(--gold)} .blue{color:var(--blue)} .purple{color:var(--purple)}
.bold{font-weight:700}
.info-box{background:#f0f4ff;border-left:5px solid var(--navy);border-radius:0 8px 8px 0;padding:18px 22px}
.warn-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:14px 18px;font-size:11px;color:#78350f;line-height:1.8}
.tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;margin-left:6px;vertical-align:middle}
.tag-var{background:#eff6ff;color:var(--blue)}
.tag-fix{background:#f0fdf4;color:var(--green)}
.royalty-area{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px 16px}
.roy-btn{padding:5px 14px;font-size:11px;font-weight:700;border:1px solid var(--green);background:#fff;color:var(--green);border-radius:4px}
.roy-btn.on{background:var(--green);color:#fff}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}

/* ── レスポンシブ ── */
@media(max-width:768px){
  #hdr{padding:16px}
  .hdr-top{flex-direction:column;gap:8px}
  .hdr-right{text-align:left}
  .hdr-title{font-size:16px}
  #invbar{padding:8px 16px;gap:6px}
  .inv-btn{padding:5px 10px;font-size:12px}
  #scbar{padding:10px 16px;gap:6px}
  .sc-btn{padding:6px 10px;font-size:11px}
  #tabbar{padding:0 16px}
  .tab-btn{padding:12px 12px;font-size:11px}
  #main{padding:16px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .kpi-val{font-size:18px}
  .g2{grid-template-columns:1fr}
  .gpl{grid-template-columns:1fr}
  .merit-grid{grid-template-columns:1fr}
  .sec-no{font-size:18px}
  .card{padding:16px}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .hdr-title{font-size:15px}
  .sc-note-text{display:none}
}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-label">株式会社 GOOD VIBES AGENCY　|　機密資料</div>
      <div class="hdr-title">CA6DEN 沖縄出店<br>投資家向けシミュレーション</div>
      <div class="hdr-sub">Shisha cafe &amp; bar CA6DEN（運営：DearBrown）<br>国際通り徒歩5分　¥35万/月　定借5年　24h年中無休</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-date" id="hdr-date"></div>
      <div class="badge-conf">CONFIDENTIAL</div>
    </div>
  </div>
</div>

<div id="invbar">
  <span class="inv-lbl">💰 投資金額（内装・設備費）：</span>
  <button class="inv-btn" data-inv="5000">¥500万</button>
  <button class="inv-btn" data-inv="7500">¥750万</button>
  <button class="inv-btn" data-inv="10000">¥1,000万</button>
  <button class="inv-btn" data-inv="15000">¥1,500万</button>
  <span class="inv-note" id="inv-note">初期投資合計（礼金・仲介・施工中家賃含む）: <strong id="inv-total"></strong></span>
</div>

<div id="scbar">
  <span class="sc-lbl">シナリオ：</span>
  <button class="sc-btn" data-sc="bear" style="--sc:#b91c1c">保守 ¥300万/月</button>
  <button class="sc-btn" data-sc="base" style="--sc:#c9941a">ベース ¥500万/月</button>
  <button class="sc-btn" data-sc="bull" style="--sc:#15803d">強気 ¥770万/月</button>
  <button class="sc-btn" data-sc="super" style="--sc:#6d28d9">超強気 ¥1,000万/月</button>
  <span class="sc-note-text" id="sc-note"></span>
</div>

<div id="tabbar">
  <button class="tab-btn" data-tab="summary">概要・投資メリット</button>
  <button class="tab-btn" data-tab="pl">P&amp;L詳細</button>
  <button class="tab-btn" data-tab="investor">投資家シミュレーション</button>
  <button class="tab-btn" data-tab="scenario">シナリオ根拠</button>
</div>

<div id="main"></div>

<div style="padding:14px 32px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:10px;color:#9aa5be;margin-top:8px">
  <span>株式会社 GOOD VIBES AGENCY　|　CA6DEN 沖縄出店 投資家向けシミュレーション</span>
  <span>本資料は投資検討用です。将来の収益を保証するものではありません。</span>
</div>

<script>
// ── 定数 ──
const RATES={cogs:.124,payFee:.0313,adv:.0109}; // 変動費率12.4%（第2期財務実績：フレーバー+ドリンク等全仕入）
const RENT=350,TERM=5; let CAPEX=15000;
function depre(){return Math.round(CAPEX/TERM/12);}
function initK(){return CAPEX+700+350+525;}
const HRS=Math.round(24*365/12);

const SC={
  bear:{label:'保守',  rev:3000, color:'#b91c1c',note:'開業初期・認知前'},
  base:{label:'ベース',rev:5000, color:'#c9941a',note:'軌道乗り・観光客定着'},
  bull:{label:'強気',  rev:7700, color:'#15803d',note:'DB六本木同等・送客フル稼働'},
  super:{label:'超強気',rev:10000,color:'#6d28d9',note:'VIPイベント常態化'},
};
const REPAY=[3,5,7,10,15];

let S={sc:'base',tab:'summary',staff:1,wage:1.0,mgr:1,mgrSal:250,util:150,other:200,outsource:150,royalty:0,showRoy:false,pct:7};

function pl(rev){
  const cogs=Math.round(rev*RATES.cogs),payF=Math.round(rev*RATES.payFee),adv=Math.round(rev*RATES.adv);
  const roy=Math.round(rev*S.royalty);
  const varC=cogs+payF+adv+roy,grossP=rev-cogs,limP=rev-varC,cm=limP/rev;
  const partL=Math.round(S.staff*S.wage*HRS),mgrL=Math.round(S.mgr*S.mgrSal),socL=Math.round(mgrL*.15);
  const labor=partL+mgrL+socL;
  const fixC=labor+RENT+depre()+S.util+S.other+S.outsource;
  const opP=rev-varC-fixC,bep=cm>0?Math.round(fixC/cm):Infinity;
  return{rev,cogs,payF,adv,roy,varC,grossP,limP,cm,partL,mgrL,socL,labor,fixC,opP,bep,
    gm:grossP/rev,om:opP/rev,lr:labor/rev,util:S.util,other:S.other,outsource:S.outsource};
}
const fM=k=>{if(!isFinite(k))return'—';const m=k/10;return m>=0?`¥${m.toFixed(1)}万`:`▲¥${Math.abs(m).toFixed(1)}万`};
const fP=v=>isFinite(v)?`${(v*100).toFixed(1)}%`:'—';
const cc=v=>v>=0?'#15803d':'#b91c1c';

// ── チャート ──
function chart(p,dp){
  const W=560,H=120,pad=22;
  const data=Array.from({length:36},(_,i)=>({op:p.opP*(i+1),gva:dp.pay*(i+1)-initK()}));
  const vals=[...data.map(d=>d.op),...data.map(d=>d.gva),0];
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const tx=i=>pad+(i/35)*(W-pad*2),ty=v=>H-pad-((v-mn)/rng)*(H-pad*2);
  const pts=k=>data.map((d,i)=>`${tx(i)},${ty(d[k])}`).join(' ');
  const zy=ty(0);
  const bk=data.findIndex(d=>d.gva>=0);
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;background:#fafbfd;border-radius:6px">
    ${[0,1,2].map(i=>{const y=pad+i*(H-pad*2)/2;return`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="#e8eaf0" stroke-width="0.5"/>`;}).join('')}
    <line x1="${pad}" y1="${zy}" x2="${W-pad}" y2="${zy}" stroke="#b0b8cc" stroke-width="1" stroke-dasharray="5,3"/>
    ${bk>=0?`<line x1="${tx(bk)}" y1="${pad}" x2="${tx(bk)}" y2="${H-pad}" stroke="#0f2557" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="${tx(bk)+4}" y="${pad+11}" font-size="9" fill="#0f2557" font-family="Noto Sans JP" font-weight="700">M${bk+1}回収</text>`:''}
    <polyline points="${pts('op')}"  fill="none" stroke="#c9941a" stroke-width="2.5" stroke-linejoin="round"/>
    <polyline points="${pts('gva')}" fill="none" stroke="#0f2557" stroke-width="2.5" stroke-linejoin="round"/>
    ${[6,12,18,24,30,36].map(m=>`<text x="${tx(m-1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="#9aa5be" font-family="Noto Sans JP">M${m}</text>`).join('')}
  </svg>
  ${bk>=0?`<p style="font-size:11px;font-weight:700;color:#0f2557;margin-top:8px">▶ 投資家累計回収 黒字転換：M${bk+1}</p>`:`<p style="font-size:11px;color:#9aa5be;margin-top:8px">▲ 36ヶ月以内に未回収</p>`}`;
}

// ── タブ：概要 ──
function tSummary(){
  const b=pl(5000);
  return`
  <div class="section">
    <div class="sec-head"><div class="sec-no">01</div><div class="sec-title">エグゼクティブサマリー</div></div>
    <div class="info-box">
      <p style="font-size:15px;font-weight:700;margin-bottom:10px">実績ある運営母体のFCモデルで、沖縄最高立地にシーシャバーを開業</p>
      <p style="font-size:12px;color:#374151;line-height:1.9">CA6DEN（運営：株式会社DearBrown）の沖縄FC出店。店舗運営はGVA（GOOD VIBES AGENCY）が担当。<br>
      DearBrown六本木店は同業態・同客層で<strong>月平均770万円の売上を実現済み</strong>（第2期8ヶ月実績）。<br>
      GVAの富裕層コネクション × インフルエンサーネットワーク × 24h無休営業で、初月から集客を見込む。</p>
    </div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-no">02</div><div class="sec-title">ベースシナリオ（月次売上¥500万）主要指標</div></div>
    <div class="kpi-grid">
      <div class="kpi" style="--ac:${cc(b.opP)}"><div class="kpi-lbl">月次営業利益</div><div class="kpi-val">${fM(b.opP)}</div><div class="kpi-sub">利益率 ${fP(b.om)}</div></div>
      <div class="kpi" style="--ac:var(--navy)"><div class="kpi-lbl">損益分岐点</div><div class="kpi-val">${fM(b.bep)}</div><div class="kpi-sub">達成率 ${fP(5000/b.bep)}</div></div>
      <div class="kpi" style="--ac:var(--gold)"><div class="kpi-lbl">初期投資合計</div><div class="kpi-val">${fM(initK())}</div><div class="kpi-sub">内装${CAPEX/10}万+礼金・仲介・家賃含む ★</div></div>
      <div class="kpi" style="--ac:var(--blue)"><div class="kpi-lbl">粗利益率</div><div class="kpi-val">${fP(b.gm)}</div><div class="kpi-sub">原価率8.5%（CA6DEN公式資料記載値）</div></div>
    </div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-no">03</div><div class="sec-title">投資メリット</div></div>
    <div class="merit-grid">
      ${[{no:'01',ttl:'実績ベースのFCモデル',mc:'var(--navy)',body:'CA6DEN運営元のDearBrown（六本木）は同業態・同客層で月平均770万円を達成済み。実証済みのビジネスモデルをそのまま展開。FC加盟金は無償。'},
         {no:'02',ttl:'開業初日から送客できる',mc:'var(--green)',body:'GVAが保有する六本木富裕層・インフルエンサーネットワークを沖縄旅行時に送客。プレオープン前からの認知形成が可能で、コールドスタートを回避できる。'},
         {no:'03',ttl:'沖縄ナイトシーンの最優立地',mc:'var(--blue)',body:'国際通り徒歩5分以内。観光客・地元富裕層・インバウンドの動線上に位置する希少立地。沖縄の夜間消費は那覇中心部に集中しており、競合参入障壁が高い。'},
         {no:'04',ttl:'24h無休による高稼働設計',mc:'var(--gold)',body:'深夜〜早朝に稼働率が上がる業態特性を活かした24h運営。競合が閉まる時間帯の独占需要を取り込み、季節変動にも強いベース収益を確保する。'},
      ].map(m=>`<div class="merit-card" style="--mc:${m.mc}"><div class="merit-no">${m.no}</div><div class="merit-ttl">${m.ttl}</div><div class="merit-body">${m.body}</div></div>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-no">04</div><div class="sec-title">投資スキームと初期費用</div></div>
    <div class="g2">
      <div class="card">
        <div class="card-ttl">初期投資内訳</div>

// ── 状態管理 ──
function setS(k,v){S[k]=v;render()}
function tog(){S.showRoy=!S.showRoy;render()}

function render(){
  const sc=SC[S.sc];
  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  document.querySelectorAll('.sc-btn').forEach(b=>b.classList.toggle('on',b.dataset.sc===S.sc));
  document.getElementById('sc-note').textContent='— '+sc.note;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('on',b.dataset.tab===S.tab));
  const m=document.getElementById('main');
  m.innerHTML={summary:tSummary,pl:tPL,investor:tInvestor,scenario:tScenario}[S.tab]();
}

document.querySelectorAll('.sc-btn').forEach(b=>b.addEventListener('click',()=>setS('sc',b.dataset.sc)));
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>setS('tab',b.dataset.tab)));
document.querySelectorAll('.inv-btn').forEach(b=>b.addEventListener('click',()=>{
  CAPEX=+b.dataset.inv;
  document.querySelectorAll('.inv-btn').forEach(x=>x.classList.toggle('on',x===b));
  document.getElementById('inv-total').textContent='¥'+(initK()/10).toFixed(1)+'万';
  render();
}));
render();
// 初期表示で1500万をONにして合計表示
document.querySelector('.inv-btn[data-inv="15000"]').classList.add('on');
document.getElementById('inv-total').textContent='¥'+(initK()/10).toFixed(1)+'万';
</script>
