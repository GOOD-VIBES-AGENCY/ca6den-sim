<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CA6DEN 沖縄出店 — 投資家向けシミュレーション</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f4f5f7;color:#1a1f2e;font-size:13px;min-height:100vh}
a{color:inherit;text-decoration:none}
table{border-collapse:collapse;width:100%}
button{cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
input[type=range]{width:100%;cursor:pointer;accent-color:#1b3a6b;height:4px;margin-top:2px}

/* ── ヘッダー ── */
#header{background:#1b3a6b;color:#fff;padding:18px 40px}
#header-inner{display:flex;justify-content:space-between;align-items:flex-end}
.header-eyebrow{font-size:10px;letter-spacing:.2em;color:#8aadde;margin-bottom:6px;font-weight:500}
.header-title{font-size:22px;font-weight:900;letter-spacing:-.01em}
.header-sub{font-size:10px;color:#6a94cc;margin-top:4px}
.header-right{text-align:right;font-size:11px;color:#8aadde}
.confidential{display:inline-block;background:#c9941a;color:#fff;font-size:10px;font-weight:700;padding:2px 10px;margin-top:6px;letter-spacing:.08em}

/* ── シナリオバー ── */
#scenario-bar{background:#e9ecf3;border-bottom:1px solid #d0d5e8;padding:10px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sc-label{font-size:11px;font-weight:600;color:#5a6a88}
.sc-btn{padding:6px 18px;font-size:12px;font-weight:700;border:2px solid #c5cbdb;background:#fff;color:#5a6a88;border-radius:0}
.sc-btn.active{border-color:var(--sc);background:var(--sc);color:#fff}
.sc-note{font-size:11px;color:#5a6a88;margin-left:8px}

/* ── タブ ── */
#tabbar{background:#fff;border-bottom:1px solid #d8dce8;display:flex;padding:0 40px}
.tab-btn{padding:13px 22px;font-size:12px;font-weight:600;background:none;border:none;color:#8a95b0;border-bottom:3px solid transparent}
.tab-btn.active{color:#1b3a6b;border-bottom-color:#1b3a6b}

/* ── コンテンツ ── */
#main{padding:28px 40px;max-width:1060px}

/* ── カード ── */
.card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:22px 24px;margin-bottom:0}
.card-title{font-size:11px;font-weight:700;color:#1b3a6b;letter-spacing:.1em;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #1b3a6b}

/* ── KPIグリッド ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi-card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:16px 18px;border-top:3px solid var(--accent,#1b3a6b)}
.kpi-label{font-size:10px;color:#7a8aaa;font-weight:600;letter-spacing:.04em;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:900;color:var(--accent,#1b3a6b);line-height:1}
.kpi-sub{font-size:10px;color:#9aa5be;margin-top:5px}

/* ── テーブル共通 ── */
.data-table th{background:#1b3a6b;color:#fff;padding:9px 14px;font-size:11px;font-weight:700;text-align:right;white-space:nowrap;border-right:1px solid #2d4e8a}
.data-table th.left{text-align:left}
.data-table td{padding:8px 14px;font-size:12px;border-bottom:1px solid #eef0f6;border-right:1px solid #eef0f6;text-align:right}
.data-table td.left{text-align:left}
.data-table tr:nth-child(even) td{background:#f8f9fc}
.data-table tr:hover td{background:#f0f4ff}

/* ── PL表 ── */
.pl-table td{padding:6px 12px;font-size:11px;border-bottom:1px solid #f0f2f8}
.pl-table td.left{text-align:left}
.pl-table td.right{text-align:right}
.pl-table .pl-bold td{font-weight:700;background:#eef1f8}
.pl-table .pl-sub{font-size:9px;color:#9aa5be;margin-left:6px}
.pl-subhead td{background:#e4e9f5;font-size:10px;font-weight:700;color:#1b3a6b;letter-spacing:.06em;padding:5px 12px}

/* ── 2カラムグリッド ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-pl{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}

/* ── スライダーパネル ── */
.slider-group{margin-bottom:12px}
.slider-label{display:flex;justify-content:space-between;font-size:11px;color:#5a6a88;margin-bottom:3px}
.slider-val{font-weight:700;color:#1b3a6b}
.seg-btn{flex:1;padding:7px 0;font-size:12px;font-weight:700;border:2px solid #d0d5e8;background:#fff;color:#8a95b0;border-radius:0}
.seg-btn.active{border-color:#1b3a6b;background:#1b3a6b;color:#fff}
.panel-section{font-size:11px;font-weight:700;color:#5a6a88;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #eef0f6}

/* ── チャート ── */
.chart-legend{display:flex;gap:20px;font-size:10px;color:#7a8aaa;margin-bottom:8px}
.legend-dot{width:24px;height:3px;display:inline-block;vertical-align:middle;margin-right:5px;border-radius:2px}

/* ── ロイヤリティトグル ── */
.royalty-btn{padding:4px 14px;font-size:10px;font-weight:700;border-radius:0;border:1px solid #15803d;background:#fff;color:#15803d}
.royalty-btn.on{background:#15803d;color:#fff}

/* ── 投資メリットカード ── */
.merit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.merit-card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:20px 22px;border-top:3px solid var(--mc,#1b3a6b)}
.merit-no{font-size:26px;font-weight:900;color:var(--mc,#1b3a6b);line-height:1;margin-bottom:8px}
.merit-title{font-size:13px;font-weight:700;color:var(--mc,#1b3a6b);margin-bottom:8px}
.merit-body{font-size:11px;color:#4a5a7a;line-height:1.85}

/* ── リスク ── */
.risk-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px}

/* ── フッター ── */
#footer{border-top:1px solid #d8dce8;padding:12px 40px;background:#fff;display:flex;justify-content:space-between;font-size:10px;color:#9aa5be;margin-top:24px}

/* ── カラー変数 ── */
.pos{color:#15803d}.neg{color:#b91c1c}.navy{color:#1b3a6b}.gold{color:#c9941a}.blue{color:#1d4ed8}.purple{color:#6d28d9}
.bg-pos{background:#f0fdf4}.bg-neg{background:#fef2f2}
.warn-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:12px 16px;font-size:11px;color:#78350f;line-height:1.8}
.warn-title{font-size:11px;font-weight:700;color:#92400e;margin-bottom:4px}
.info-box{background:#f0f4ff;border-left:4px solid #1b3a6b;border-radius:0 6px 6px 0;padding:16px 20px}

/* ── セクション見出し ── */
.section-heading{font-size:11px;font-weight:700;color:#1b3a6b;letter-spacing:.1em;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #1b3a6b;display:flex;justify-content:space-between;align-items:center}

/* ── ギャップ ── */
.gap{display:flex;flex-direction:column;gap:20px}
.gap-sm{display:flex;flex-direction:column;gap:12px}
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="header">
  <div id="header-inner">
    <div>
      <div class="header-eyebrow">株式会社 GOOD VIBES AGENCY　|　機密資料</div>
      <div class="header-title">CA6DEN 沖縄出店　投資家向けシミュレーション</div>
      <div class="header-sub">Shisha cafe &amp; bar CA6DEN（運営：DearBrown）　国際通り徒歩5分　月額賃料¥35万　定借5年　24h年中無休</div>
    </div>
    <div class="header-right">
      <div id="today-date"></div>
      <div class="confidential">CONFIDENTIAL</div>
    </div>
  </div>
</div>

<!-- シナリオバー -->
<div id="scenario-bar">
  <span class="sc-label">シナリオ：</span>
  <button class="sc-btn" data-sc="bear" style="--sc:#b91c1c">保守　¥300万/月</button>
  <button class="sc-btn" data-sc="base" style="--sc:#c9941a">ベース　¥500万/月</button>
  <button class="sc-btn" data-sc="bull" style="--sc:#15803d">強気　¥770万/月</button>
  <button class="sc-btn" data-sc="super" style="--sc:#6d28d9">超強気　¥1,000万/月</button>
  <span class="sc-note" id="sc-note"></span>
</div>

<!-- タブ -->
<div id="tabbar">
  <button class="tab-btn" data-tab="summary">概要・投資メリット</button>
  <button class="tab-btn" data-tab="pl">P&amp;L詳細</button>
  <button class="tab-btn" data-tab="investor">投資家シミュレーション</button>
  <button class="tab-btn" data-tab="scenario">シナリオ根拠</button>
</div>

<!-- メインコンテンツ -->
<div id="main"></div>

<!-- フッター -->
<div id="footer">
  <span>株式会社 GOOD VIBES AGENCY　|　CA6DEN 沖縄出店 投資家向けシミュレーション</span>
  <span>本資料は投資検討用です。将来の収益を保証するものではありません。</span>
</div>

<script>
// ══════════════════════════════════════════
// 定数・計算
// ══════════════════════════════════════════
const RATES = {cogs:.1245, paymentFee:.0313, advertising:.0109};
const RENT=350, CAPEX=15000, TERM=5;
const DEPRE=Math.round(CAPEX/TERM/12); // 250
const INIT_K=CAPEX+700+350+525; // 16575（施工中家賃含む★）
const HOURS=Math.round(24*365/12); // 730

const SCENARIOS={
  bear: {label:'保守',   rev:3000,  color:'#b91c1c', note:'開業初期・認知前'},
  base: {label:'ベース', rev:5000,  color:'#c9941a', note:'軌道乗り・観光客定着'},
  bull: {label:'強気',   rev:7702,  color:'#15803d', note:'DB六本木同等・送客フル稼働'},
  super:{label:'超強気', rev:10000, color:'#6d28d9', note:'VIPイベント常態化'},
};
const REPAY=[3,5,7,10,15];

let S={
  scenario:'base', tab:'summary',
  staffPerShift:1, partWage:1.0,
  managerCount:1,  managerSalary:250,
  utilities:175,   otherFixed:250,
  royaltyRate:0,   showRoyalty:false,
  displayPct:7,
};

function calcPL(rev){
  const cogs=Math.round(rev*RATES.cogs);
  const payFee=Math.round(rev*RATES.paymentFee);
  const adv=Math.round(rev*RATES.advertising);
  const royalty=Math.round(rev*S.royaltyRate);
  const varCost=cogs+payFee+adv+royalty;
  const grossP=rev-cogs;
  const limitP=rev-varCost;
  const cmRate=limitP/rev;
  const partL=Math.round(S.staffPerShift*S.partWage*HOURS);
  const mgrL=Math.round(S.managerCount*S.managerSalary);
  const socL=Math.round(mgrL*.15);
  const labor=partL+mgrL+socL;
  const fixedCost=labor+RENT+DEPRE+S.utilities+S.otherFixed;
  const totalCost=varCost+fixedCost;
  const opP=rev-totalCost;
  const bep=cmRate>0?Math.round(fixedCost/cmRate):Infinity;
  return {rev,cogs,payFee,adv,royalty,varCost,grossP,limitP,cmRate,
    partL,mgrL,socL,labor,fixedCost,totalCost,opP,bep,
    grossM:grossP/rev, opM:opP/rev, laborR:labor/rev};
}

const fM=k=>{if(!isFinite(k))return'—';const m=k/10;return m>=0?`¥${m.toFixed(1)}万`:`▲¥${Math.abs(m).toFixed(1)}万`};
const fP=v=>isFinite(v)?`${(v*100).toFixed(1)}%`:'—';
const clr=v=>v>=0?'#15803d':'#b91c1c';
const clrCls=v=>v>=0?'pos':'neg';

// ══════════════════════════════════════════
// SVGチャート
// ══════════════════════════════════════════
function makeChart(pl,dp){
  const data=Array.from({length:36},(_,i)=>({
    cumOP:pl.opP*(i+1), cumGVA:dp.payment*(i+1)-INIT_K
  }));
  const W=560,H=120,pad=20;
  const vals=[...data.map(d=>d.cumOP),...data.map(d=>d.cumGVA),0];
  const minV=Math.min(...vals),maxV=Math.max(...vals),range=maxV-minV||1;
  const toX=i=>pad+(i/(data.length-1))*(W-pad*2);
  const toY=v=>H-pad-((v-minV)/range)*(H-pad*2);
  const pts=key=>data.map((d,i)=>`${toX(i)},${toY(d[key])}`).join(' ');
  const zeroY=toY(0);
  const bkM=data.findIndex(d=>d.cumGVA>=0);
  let bkLine='';
  if(bkM>=0){
    const bx=toX(bkM);
    bkLine=`<line x1="${bx}" y1="${pad}" x2="${bx}" y2="${H-pad}" stroke="#1b3a6b" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="${bx+4}" y="${pad+10}" font-size="8" fill="#1b3a6b" font-family="Noto Sans JP">M${bkM+1}回収</text>`;
  }
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;background:#fafbfd;border-radius:4px">
    <rect width="${W}" height="${H}" fill="#fafbfd"/>
    ${[0,1,2,3].map(i=>{const y=pad+i*(H-pad*2)/3;return`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="#e8eaf0" stroke-width="0.5"/>`;}).join('')}
    <line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="#9aa5be" stroke-width="1" stroke-dasharray="5,3"/>
    ${bkLine}
    <polyline points="${pts('cumOP')}" fill="none" stroke="#c9941a" stroke-width="2.5" stroke-linejoin="round"/>
    <polyline points="${pts('cumGVA')}" fill="none" stroke="#1b3a6b" stroke-width="2.5" stroke-linejoin="round"/>
    ${[6,12,18,24,30,36].map(m=>`<text x="${toX(m-1)}" y="${H-3}" text-anchor="middle" font-size="8" fill="#9aa5be" font-family="Noto Sans JP">M${m}</text>`).join('')}
  </svg>
  ${bkM>=0?`<div style="font-size:11px;font-weight:700;color:#1b3a6b;margin-top:6px">▶ 投資家累計回収 黒字転換：M${bkM+1}</div>`:'<div style="font-size:11px;color:#9aa5be;margin-top:6px">▲ 36ヶ月以内に未回収</div>'}`;
}

// ══════════════════════════════════════════
// タブコンテンツ生成
// ══════════════════════════════════════════
function renderSummary(sc,pl){
  const bPL=calcPL(5000);
  const kpis=[
    {label:'月次営業利益',val:fM(bPL.opP),sub:`利益率 ${fP(bPL.opM)}（ベース）`,accent:clr(bPL.opP)},
    {label:'損益分岐点',val:fM(bPL.bep),sub:`達成率 ${fP(5000/bPL.bep)}（ベース）`,accent:'#1b3a6b'},
    {label:'初期投資合計',val:fM(INIT_K),sub:'施工中家賃1.5ヶ月含む ★',accent:'#c9941a'},
    {label:'粗利益率',val:fP(bPL.grossM),sub:'DB六本木実績ベース（同業態）',accent:'#1d4ed8'},
  ];
  const merits=[
    {no:'01',title:'実績ベースのFCモデル',color:'#1b3a6b',
     body:'CA6DEN運営元のDearBrown（六本木）は同業態・同客層で月平均770万円を達成済み。検証済みのビジネスモデルをそのまま展開。FC加盟金は無償。'},
    {no:'02',title:'開業初日から送客できる',color:'#15803d',
     body:'GVAが保有する六本木富裕層・インフルエンサーネットワークを沖縄旅行時に送客。プレオープン前からの認知形成が可能で、コールドスタートを回避できる。'},
    {no:'03',title:'沖縄ナイトシーンの最優立地',color:'#1d4ed8',
     body:'国際通り徒歩5分以内。観光客・地元富裕層・インバウンドの動線上に位置する希少立地。沖縄の夜間消費は那覇中心部に集中しており、競合参入障壁が高い。'},
    {no:'04',title:'24h無休による高稼働設計',color:'#c9941a',
     body:'深夜〜早朝に稼働率が上がる業態特性を活かした24h運営。競合が閉まる時間帯の独占需要を取り込み、季節変動にも強いベース収益を確保する。'},
  ];
  const risks=[
    {risk:'開業初期の売上未達',level:'中',lc:'#c9941a',
     mit:'六本木顧客への事前告知・プレオープンイベントで初月から集客。売上連動返済のため、低売上時の返済額も自動で減少する。'},
    {risk:'季節変動・オフシーズン',level:'低',lc:'#15803d',
     mit:'沖縄の観光は年間を通じて安定。夏（7〜9月）と年末年始が繁忙期。24h営業×地元客で下支えされるため季節影響は限定的。'},
    {risk:'競合他社の参入',level:'中',lc:'#c9941a',
     mit:'DearBrownブランド×六本木コネクション×GVAのインフルエンサーネットワークは模倣困難。国際通り近接の立地希少性も参入障壁となる。'},
    {risk:'人材確保・オペレーション',level:'中',lc:'#c9941a',
     mit:'1〜2名オペで回る低人件費設計。沖縄はサービス業人材が豊富。DearBrownのオペレーションノウハウをFC提供。'},
  ];
  const bRows=REPAY.map(pct=>{
    const pay=Math.round(5000*pct/100);
    const net=bPL.opP-pay;
    const pb=Math.ceil(INIT_K/pay);
    const good=net>=0&&pb<=48;
    const judge=net<0?'❌ 赤字':pb<=36?'◎ 優良':pb<=48?'○ 可':'△ 長期';
    const jc=net<0?'#b91c1c':pb<=36?'#15803d':pb<=48?'#c9941a':'#8a95b0';
    return `<tr>
      <td class="left" style="font-weight:700;color:#1b3a6b">売上の${pct}%</td>
      <td style="font-weight:700">${fM(pay)}</td>
      <td style="color:${clr(net)};font-weight:700">${fM(net)}</td>
      <td style="color:${pb<=36?'#15803d':pb<=48?'#c9941a':'#8a95b0'}">${pb}ヶ月</td>
      <td>${fM(pay*36)}</td><td>${fM(pay*60)}</td>
      <td style="color:${jc};font-weight:700">${judge}</td>
    </tr>`;
  }).join('');

  return `<div class="gap">
    <div class="info-box">
      <div style="font-size:11px;font-weight:700;color:#1b3a6b;letter-spacing:.1em;margin-bottom:8px">EXECUTIVE SUMMARY</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px">実績ある運営母体のFCモデルで、沖縄最高立地にシーシャバーを開業</div>
      <div style="font-size:12px;color:#374151;line-height:1.9">
        CA6DEN（運営：株式会社DearBrown）の沖縄FC出店。店舗運営はGVA（GOOD VIBES AGENCY）が担当。<br>
        DearBrown六本木店は同業態・同客層で<strong>月平均770万円の売上を実現済み</strong>（第2期8ヶ月実績）。<br>
        GVAの富裕層コネクション × インフルエンサーネットワーク × 24h無休営業で、初月から集客を見込む。
      </div>
    </div>

    <div>
      <div class="section-heading">ベースシナリオ（月次売上¥500万）主要指標</div>
      <div class="kpi-grid">${kpis.map(k=>`<div class="kpi-card" style="--accent:${k.accent}">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value">${k.val}</div>
        <div class="kpi-sub">${k.sub}</div>
      </div>`).join('')}</div>
    </div>

    <div>
      <div class="section-heading">投資メリット</div>
      <div class="merit-grid">${merits.map(m=>`<div class="merit-card" style="--mc:${m.color}">
        <div class="merit-no">${m.no}</div>
        <div class="merit-title">${m.title}</div>
        <div class="merit-body">${m.body}</div>
      </div>`).join('')}</div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">初期投資内訳</div>
        <table>
          <tbody>

          <th>投資家回収</th><th>36M累計</th><th>60M累計</th><th>判定</th>
        </tr></thead>
        <tbody>${allPat.map((p,i)=>{
          const viable=p.netCF>=0,payOk=p.paybackM<=36;
          const judge=!viable?'❌ 赤字':payOk?'◎ 優良':p.paybackM<=60?'○ 可':'△ 長期';
          const jc=!viable?'#b91c1c':payOk?'#15803d':p.paybackM<=60?'#c9941a':'#8a95b0';
          return`<tr style="cursor:pointer;background:${S.displayPct===p.pct?'#e8edf5':i%2===0?'#fff':'#f8f9fc'}" onclick="setState('displayPct',${p.pct})">
            <td class="left" style="font-weight:700;color:#1b3a6b">売上${p.pct}%</td>
            <td style="font-weight:700">${fM(p.payment)}</td>
            <td style="color:${clr(p.netCF)};font-weight:700">${fM(p.netCF)}</td>
            <td style="color:${payOk?'#15803d':'#8a95b0'}">${p.paybackM<999?p.paybackM+'ヶ月':'—'}</td>
            <td>${fM(p.total36)}</td><td>${fM(p.total60)}</td>
            <td style="color:${jc};font-weight:700">${judge}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 18px;border-bottom:1px solid #eef0f6;font-size:11px;font-weight:700;color:#1b3a6b">GVA手残りCF マトリクス（全シナリオ × 全返済率）</div>
      <table class="data-table">
        <thead><tr>
          <th class="left">シナリオ</th>${REPAY.map(p=>`<th>売上${p}%</th>`).join('')}
        </tr></thead>
        <tbody>${matrixRows}</tbody>
      </table>
    </div>
  </div>`;
}

    {sc:SCENARIOS.base,icon:'◎',

     assumption:'1日平均売上 ¥16.4万。シャンパン8〜10本/日相当。'},
    {sc:SCENARIOS.bull,icon:'🎯',
     factors:['六本木コネクション経由の送客が本格稼働','那覇の夜遊びの定番スポットとして定着','インバウンド富裕層の取り込み','VIP予約・ボトルキープが常態化'],
     assumption:'1日平均売上 ¥25.7万。DearBrown六本木（CA6DEN運営元）第2期実績と同水準（月770万）。実証済みの数字。'},
    {sc:SCENARIOS.super,icon:'🚀',
     factors:['SNSバイラル・インフルエンサー来店で爆発的認知','シャンパンタワー・大型VIPイベントが月複数回','沖縄ナイトライフNo.1ブランドとして確立','観光シーズン（夏・年末年始）の超高単価月'],
     assumption:'1日平均売上 ¥32.8万。週末だけで月売上の60%を達成するイメージ。'},
  ];
  return`<div class="gap">
    ${data.map(({sc:s,icon,factors,assumption})=>{
      const p=calcPL(s.rev);
      return`<div style="background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;border-left:5px solid ${s.color}">
        <div style="padding:14px 20px;border-bottom:1px solid #eef0f6;display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:20px">${icon}</span>
            <span style="color:${s.color};font-weight:700;font-size:15px">${s.label}シナリオ</span>
            <span style="color:${s.color};font-size:13px;font-weight:700">${fM(s.rev)}/月</span>
            <span style="color:#8a95b0;font-size:11px">（年間 ${fM(s.rev*12)}）</span>
          </div>
          <span style="background:${s.color}18;color:${s.color};border:1px solid ${s.color}50;padding:3px 12px;font-size:10px;font-weight:700;border-radius:3px">${s.note}</span>
        </div>
        <div style="padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div>
            <div style="font-size:11px;font-weight:700;color:#8a95b0;margin-bottom:10px">シナリオ前提</div>
            ${factors.map((f,i)=>`<div style="font-size:11px;color:#374151;padding:5px 0;border-bottom:1px solid #f0f2f8">${i+1}. ${f}</div>`).join('')}
            <div style="margin-top:10px;padding:8px 14px;background:${s.color}0d;border-left:3px solid ${s.color};font-size:11px;color:#374151;line-height:1.75">${assumption}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#8a95b0;margin-bottom:10px">このシナリオでの試算</div>
            ${[['営業利益/月',fM(p.opP),clr(p.opP)],['営業利益率',fP(p.opM),clr(p.opP)],['BEP達成率',fP(p.rev/p.bep),'#6d28d9'],['年間営業利益',fM(p.opP*12),clr(p.opP)],['損益分岐点',fM(p.bep),'#8a95b0']].map(([k,v,c])=>`
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f2f8">

        </div>
      </div>`;
    }).join('')}
    <div class="warn-box">
      <div class="warn-title">★ 修正済みコスト前提について</div>
      ${[['水道光熱費（17.5万/月）','24h年中無休・シーシャ炭火使用・沖縄高温環境（冷房強化）を実態反映。旧設定10万から修正。'],['その他固定費（25万/月）','消耗品・シーシャ機材メンテ・ゴミ処理・損害保険等の実態値。旧設定5万から修正。'],['施工期間家賃（52.5万）','内装施工1.5ヶ月分を初期投資に計上済み（35万×1.5）。旧試算に未計上だったものを追加。']].map(([k,v])=>`

        <span style="font-size:11px;font-weight:700;color:#92400e;min-width:170px">${k}</span>
        <span style="font-size:11px">${v}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// 状態管理・レンダリング
// ══════════════════════════════════════════
function setState(key,val){S[key]=val;render()}
function toggleRoyalty(){S.showRoyalty=!S.showRoyalty;render()}

function render(){
  const sc=SCENARIOS[S.scenario];
  const pl=calcPL(sc.rev);

  // 今日の日付
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  // シナリオボタン
  document.querySelectorAll('.sc-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.sc===S.scenario);
  });
  document.getElementById('sc-note').textContent='— '+sc.note;

  // タブ
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===S.tab);
  });

  // コンテンツ
  const main=document.getElementById('main');
  if(S.tab==='summary') main.innerHTML=renderSummary(sc,pl);
  else if(S.tab==='pl')  main.innerHTML=renderPL(sc,pl);
  else if(S.tab==='investor') main.innerHTML=renderInvestor(sc,pl);
  else main.innerHTML=renderScenario(sc,pl);
}

// イベント
document.querySelectorAll('.sc-btn').forEach(b=>b.addEventListener('click',()=>setState('scenario',b.dataset.sc)));
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>setState('tab',b.dataset.tab)));

// 初期レンダリング
setState('tab','summary');
</script>
</body>
</html>
