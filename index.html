<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CA6DEN 沖縄出店 投資家向けシミュレーション</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f2f3f5;
      color: #1a1f2e;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }
    input[type=range] { cursor: pointer; width: 100%; accent-color: #1b2f5c; }
    button { cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const RATES = { cogs: 0.1245, paymentFee: 0.0313, advertising: 0.0109 };
const PROPERTY = { rent:350, deposit:700, agency:350, capex:15000, construction:525, term:5 };
const DEPRE  = Math.round(PROPERTY.capex / PROPERTY.term / 12);
const INIT_K = PROPERTY.capex + PROPERTY.deposit + PROPERTY.agency + PROPERTY.construction;
const HOURS_MONTH = Math.round(24 * 365 / 12);

const SCENARIOS = [
  { key:"bear",  label:"保守",   rev:3000,  color:"#b91c1c", note:"開業初期・認知前" },
  { key:"base",  label:"ベース", rev:5000,  color:"#b45309", note:"軌道乗り・観光客定着" },
  { key:"bull",  label:"強気",   rev:7702,  color:"#15803d", note:"DB六本木同等・送客フル稼働" },
  { key:"super", label:"超強気", rev:10000, color:"#6d28d9", note:"VIPイベント常態化" },
];
const REPAY_RATES = [3,5,7,10,15];

function calcPL({ rev, staffPerShift, partWage, managerCount, managerSalary,
  socialInsRate, utilities, otherFixed, royaltyRate }) {
  const cogs         = Math.round(rev * RATES.cogs);
  const paymentFee   = Math.round(rev * RATES.paymentFee);
  const advertising  = Math.round(rev * RATES.advertising);
  const royalty      = Math.round(rev * royaltyRate);
  const variableCost = cogs + paymentFee + advertising + royalty;
  const grossProfit  = rev - cogs;
  const grossMargin  = grossProfit / rev;
  const limitProfit  = rev - variableCost;
  const cmRate       = limitProfit / rev;
  const partLabor    = Math.round(staffPerShift * partWage * HOURS_MONTH);
  const managerLabor = Math.round(managerCount * managerSalary);
  const socialIns    = Math.round(managerLabor * socialInsRate);
  const totalLabor   = partLabor + managerLabor + socialIns;
  const fixedCost    = totalLabor + PROPERTY.rent + DEPRE + utilities + otherFixed;
  const totalCost    = variableCost + fixedCost;
  const operatingProfit = rev - totalCost;
  const operatingMargin = operatingProfit / rev;
  const bep = cmRate > 0 ? Math.round(fixedCost / cmRate) : Infinity;
  return {
    rev, cogs, paymentFee, advertising, royalty, variableCost,
    grossProfit, grossMargin, limitProfit, cmRate,
    partLabor, managerLabor, socialIns, totalLabor,
    utilities, otherFixed, fixedCost, totalCost,
    operatingProfit, operatingMargin, laborRate: totalLabor/rev, bep,
  };
}

const fM = k => {
  if (!isFinite(k)) return "—";
  const m = k / 10;
  return m >= 0 ? `¥${m.toFixed(1)}万` : `▲¥${Math.abs(m).toFixed(1)}万`;
};
const fP = v => isFinite(v) ? `${(v*100).toFixed(1)}%` : "—";

export default function App() {
  const [scenario,      setScenario]      = useState("base");
  const [staffPerShift, setStaffPerShift] = useState(1);
  const [partWage,      setPartWage]      = useState(1.0);
  const [managerCount,  setManagerCount]  = useState(1);
  const [managerSalary, setManagerSalary] = useState(250);
  const [utilities,     setUtilities]     = useState(175);
  const [otherFixed,    setOtherFixed]    = useState(250);
  const [royaltyRate,   setRoyaltyRate]   = useState(0);
  const [showRoyalty,   setShowRoyalty]   = useState(false);
  const [tab,           setTab]           = useState("summary");
  const [displayPct,    setDisplayPct]    = useState(7);

  const sc = SCENARIOS.find(s => s.key === scenario);
  const pl = calcPL({ rev:sc.rev, staffPerShift, partWage, managerCount, managerSalary,
    socialInsRate:0.15, utilities, otherFixed, royaltyRate });

  const patterns = REPAY_RATES.map(pct => {
    const payment  = Math.round(sc.rev * pct / 100);
    const netCF    = pl.operatingProfit - payment;
    const paybackM = payment > 0 ? Math.ceil(INIT_K / payment) : 999;
    return { pct, payment, netCF, total36:payment*36, total60:payment*60, paybackM };
  });
  const dp = patterns.find(p => p.pct === displayPct) || patterns[2];

  const chartData = Array.from({ length:36 }, (_,i) => ({
    m: i+1, cumOP: pl.operatingProfit*(i+1), cumGVA: dp.payment*(i+1) - INIT_K,
  }));

  // ── スタイル ──
  const navy  = "#1b2f5c";
  const red   = "#b91c1c";
  const green = "#15803d";
  const gray  = "#64748b";
  const line  = "#d1d5db";

  const TH = ({ children, align="right", w }) => (
    <th style={{ padding:"8px 12px", fontSize:11, fontWeight:700, color:"#fff",
      background:navy, textAlign:align, whiteSpace:"nowrap",
      borderRight:`1px solid #2d4a7a`, width:w||"auto" }}>{children}</th>
  );
  const TD = ({ children, color, bold, align="right", bg }) => (
    <td style={{ padding:"8px 12px", fontSize:12, textAlign:align,
      color:color||"#1a1f2e", fontWeight:bold?700:400,
      borderBottom:`1px solid ${line}`, borderRight:`1px solid ${line}`,
      background:bg||"transparent" }}>{children}</td>
  );

  const PLRow = ({ label, value, pct, bold, indent, color, sub }) => (
    <tr style={{ background: bold ? "#eef1f8" : "transparent" }}>
      <TD align="left" bold={bold}>
        <span style={{ paddingLeft: indent?24:0, color: indent?"#374151":"#1a1f2e", fontSize:indent?11:12 }}>
          {label}
          {sub && <span style={{ fontSize:9, color:gray, marginLeft:6 }}>{sub}</span>}
        </span>
      </TD>
      <TD color={gray}>{pct!==undefined ? fP(pct) : ""}</TD>
      <TD color={color||(bold?navy:"#1a1f2e")} bold={bold}>{fM(value)}</TD>
    </tr>
  );

  const SubHead = ({ text }) => (
    <tr><td colSpan={3} style={{ background:"#e8edf5", padding:"5px 12px",
      fontSize:10, fontWeight:700, color:navy, letterSpacing:"0.06em" }}>{text}</td></tr>
  );

  const Slider = ({ label, value, min, max, step, onChange, display }) => (
    <div style={{ marginBottom:12 }}>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:3 }}>
        <span style={{ color:gray }}>{label}</span>
        <span style={{ fontWeight:700, color:navy }}>{display}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(+e.target.value)}/>
    </div>
  );

  const ChartSVG = ({ data }) => {
    const W=560, H=110, pad=20;
    const vals=[...data.map(d=>d.cumOP),...data.map(d=>d.cumGVA),0];
    const minV=Math.min(...vals), maxV=Math.max(...vals), range=maxV-minV||1;
    const toX=i=>pad+(i/(data.length-1))*(W-pad*2);
    const toY=v=>H-pad-((v-minV)/range)*(H-pad*2);
    const pts=key=>data.map((d,i)=>`${toX(i)},${toY(d[key])}`).join(" ");
    const zeroY=toY(0);
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
        <rect width={W} height={H} fill="#fafbfd"/>
        {[0,1,2,3].map(i=>{
          const y=pad+i*(H-pad*2)/3;
          return <line key={i} x1={pad} y1={y} x2={W-pad} y2={y} stroke={line} strokeWidth={0.5}/>;
        })}
        <line x1={pad} y1={zeroY} x2={W-pad} y2={zeroY} stroke={gray} strokeWidth={1} strokeDasharray="5,3"/>
        <polyline points={pts("cumOP")}  fill="none" stroke="#b45309" strokeWidth={2.5}/>
        <polyline points={pts("cumGVA")} fill="none" stroke={navy}   strokeWidth={2.5}/>
        {[6,12,18,24,30,36].map(m=>(
          <text key={m} x={toX(m-1)} y={H-3} textAnchor="middle" fontSize={8} fill={gray} fontFamily="Noto Sans JP">M{m}</text>
        ))}
      </svg>
    );
  };

  const tabs = [
    ["summary","概要・投資メリット"],
    ["pl","P&L詳細"],
    ["investor","投資家シミュレーション"],
    ["scenario","シナリオ根拠"],
  ];

  const today = new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"});

  return (
    <div style={{ background:"#f2f3f5", minHeight:"100vh" }}>

      {/* ── ヘッダー ── */}
      <div style={{ background:"#fff", borderBottom:`3px solid ${navy}`, padding:"16px 36px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
          <div>
            <div style={{ fontSize:11, color:gray, fontWeight:500, marginBottom:4, letterSpacing:"0.06em" }}>
              株式会社GOOD VIBES AGENCY　｜　機密・社外秘
            </div>
            <div style={{ fontSize:22, fontWeight:900, color:navy, letterSpacing:"-0.01em" }}>
              CA6DEN 沖縄出店　投資家向けシミュレーション
            </div>
            <div style={{ fontSize:11, color:gray, marginTop:4 }}>
              Shisha cafe &amp; bar CA6DEN（運営：DearBrown）　国際通り徒歩5分　月額賃料¥35万　定借5年　24h年中無休
            </div>
          </div>
          <div style={{ textAlign:"right", fontSize:11, color:gray }}>
            <div>{today}</div>
            <div style={{ marginTop:4 }}>
              <span style={{ background:navy, color:"#fff", padding:"2px 10px", fontSize:11, fontWeight:700 }}>CONFIDENTIAL</span>
            </div>
          </div>
        </div>
      </div>

      {/* ── シナリオ選択バー ── */}
      <div style={{ background:"#e8edf5", borderBottom:`1px solid ${line}`, padding:"10px 36px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
          <span style={{ fontSize:11, color:gray, fontWeight:600, marginRight:4 }}>シナリオ選択：</span>
          {SCENARIOS.map(s => (
            <button key={s.key} onClick={() => setScenario(s.key)} style={{
              padding:"5px 20px", fontSize:12, fontWeight:700,
              border:`2px solid ${scenario===s.key ? s.color : line}`,
              background: scenario===s.key ? s.color : "#fff",
              color: scenario===s.key ? "#fff" : gray,
              borderRadius:0,
            }}>{s.label}　{fM(s.rev)}/月</button>
          ))}
          <span style={{ fontSize:11, color:sc.color, marginLeft:8, fontWeight:500 }}>— {sc.note}</span>
        </div>
      </div>

      {/* ── タブ ── */}
      <div style={{ background:"#fff", borderBottom:`1px solid ${line}`, display:"flex", padding:"0 36px" }}>
        {tabs.map(([id,label]) => (
          <button key={id} onClick={() => setTab(id)} style={{
            padding:"12px 20px", fontSize:12, fontWeight:600,
            background:"transparent", border:"none",
            borderBottom: tab===id ? `3px solid ${navy}` : "3px solid transparent",
            color: tab===id ? navy : gray,
          }}>{label}</button>
        ))}
      </div>

      <div style={{ padding:"28px 36px", maxWidth:1020 }}>

        {/* ════ 概要・投資メリット ════ */}
        {tab==="summary" && (
          <div style={{ display:"flex", flexDirection:"column", gap:24 }}>

            {/* エグゼクティブサマリー */}
            <div style={{ background:"#fff", borderLeft:`5px solid ${navy}`, padding:"20px 24px" }}>
              <div style={{ fontSize:11, fontWeight:700, color:navy, letterSpacing:"0.1em", marginBottom:10 }}>EXECUTIVE SUMMARY</div>
              <div style={{ fontSize:15, fontWeight:700, color:"#1a1f2e", marginBottom:8 }}>
                実績ある運営母体のFCモデルで、沖縄最高立地にシーシャバーを開業
              </div>
              <div style={{ fontSize:12, color:"#374151", lineHeight:1.9 }}>
                CA6DEN（運営：株式会社DearBrown）の沖縄FC出店。店舗運営はGVA（GOOD VIBES AGENCY）が担当。<br/>
                DearBrown六本木店は同業態・同客層で<strong>月平均770万円の売上を実現済み</strong>（第2期8ヶ月実績）。<br/>
                GVAの富裕層コネクション × インフルエンサーネットワーク × 24h無休営業で、初月から集客を見込む。
              </div>
            </div>

            {/* KPI */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:navy, letterSpacing:"0.08em", marginBottom:12, paddingBottom:6, borderBottom:`2px solid ${navy}` }}>
                ベースシナリオ（月次売上¥500万）主要指標
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:1, background:line }}>
                {(() => {
                  const p = calcPL({ rev:5000, staffPerShift, partWage, managerCount, managerSalary, socialInsRate:0.15, utilities, otherFixed, royaltyRate });
                  return [
                    ["月次営業利益", fM(p.operatingProfit), fP(p.operatingMargin), p.operatingProfit>=0?green:red],
                    ["損益分岐点", fM(p.bep), `達成率 ${fP(5000/p.bep)}`, navy],
                    ["初期投資合計", fM(INIT_K), "施工中家賃含む★", "#92400e"],
                    ["粗利益率", fP(p.grossMargin), "DB六本木実績ベース", "#1d4ed8"],
                  ].map(([label,val,sub,color])=>(
                    <div key={label} style={{ background:"#fff", padding:"16px 20px" }}>
                      <div style={{ fontSize:10, color:gray, fontWeight:600, marginBottom:6, letterSpacing:"0.04em" }}>{label}</div>
                      <div style={{ fontSize:22, fontWeight:900, color }}>{val}</div>
                      <div style={{ fontSize:10, color:gray, marginTop:4 }}>{sub}</div>
                    </div>
                  ));
                })()}
              </div>
            </div>

            {/* 投資メリット */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:navy, letterSpacing:"0.08em", marginBottom:12, paddingBottom:6, borderBottom:`2px solid ${navy}` }}>
                投資メリット
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:1, background:line }}>
                {[
                  { no:"01", title:"実績ベースのFCモデル", color:navy,
                    body:"CA6DEN運営元のDearBrown（六本木）は同業態・同客層で月平均770万円を達成済み。検証済みのビジネスモデルをそのまま展開。FC加盟金は無償。" },
                  { no:"02", title:"開業初日から送客できる", color:green,
                    body:"GVAが保有する六本木富裕層・インフルエンサーネットワークを、沖縄旅行時に送客。プレオープン前からの認知形成が可能で、コールドスタートを回避できる。" },
                  { no:"03", title:"沖縄ナイトシーンの最優立地", color:"#1d4ed8",
                    body:"国際通り徒歩5分以内。観光客・地元富裕層・インバウンドの動線上に位置する希少立地。沖縄の夜間消費は那覇中心部に集中しており、競合参入障壁が高い。" },
                  { no:"04", title:"24h無休による高稼働設計", color:"#92400e",
                    body:"深夜〜早朝に稼働率が上がる業態特性を活かした24h運営。競合が閉まる時間帯の独占需要を取り込み、季節変動にも強いベース収益を確保する。" },
                ].map(({ no,title,color,body }) => (
                  <div key={no} style={{ background:"#fff", padding:"20px 24px" }}>
                    <div style={{ display:"flex", alignItems:"flex-start", gap:16, marginBottom:10 }}>
                      <div style={{ fontSize:24, fontWeight:900, color, lineHeight:1, minWidth:36 }}>{no}</div>
                      <div style={{ fontSize:13, fontWeight:700, color, paddingTop:4 }}>{title}</div>
                    </div>
                    <div style={{ fontSize:11, color:"#374151", lineHeight:1.85, paddingLeft:52 }}>{body}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* 投資スキーム */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:navy, letterSpacing:"0.08em", marginBottom:12, paddingBottom:6, borderBottom:`2px solid ${navy}` }}>
                投資スキームと初期費用
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:1, background:line }}>
                <div style={{ background:"#fff", padding:"20px 24px" }}>
                  <div style={{ fontSize:11, fontWeight:700, color:gray, marginBottom:12, letterSpacing:"0.06em" }}>初期投資内訳</div>
                  <table style={{ width:"100%", borderCollapse:"collapse" }}>
                    <tbody>
                      {[
                        ["内装・設備（フル施工）", "¥1,500万", false],
                        ["礼金（2ヶ月分）", "¥70万", false],
                        ["仲介手数料（1ヶ月分）", "¥35万", false],
                        ["施工期間家賃（1.5ヶ月）★", "¥52.5万", true],
                        ["FC加盟金", "¥0（無償）", false],
                      ].map(([k,v,hl]) => (
                        <tr key={k}>
                          <td style={{ padding:"6px 0", borderBottom:`1px solid ${line}`, fontSize:11,
                            color:hl?"#92400e":gray }}>{k}</td>
                          <td style={{ padding:"6px 0", borderBottom:`1px solid ${line}`, fontSize:11,
                            textAlign:"right", fontWeight:hl?700:400, color:hl?"#92400e":"#1a1f2e" }}>{v}</td>
                        </tr>
                      ))}
                      <tr>
                        <td style={{ padding:"8px 0", fontSize:13, fontWeight:700, color:navy }}>合計</td>
                        <td style={{ padding:"8px 0", fontSize:13, fontWeight:700, color:navy, textAlign:"right" }}>¥{(INIT_K/10).toFixed(1)}万</td>
                      </tr>
                    </tbody>
                  </table>
                  <div style={{ fontSize:10, color:gray, marginTop:8, lineHeight:1.7 }}>
                    ★施工期間家賃：内装工事期間1.5ヶ月分を計上（35万×1.5）
                  </div>
                </div>
                <div style={{ background:"#fff", padding:"20px 24px" }}>
                  <div style={{ fontSize:11, fontWeight:700, color:gray, marginBottom:12, letterSpacing:"0.06em" }}>返済モデルの特徴（売上連動型）</div>
                  {[
                    ["返済方式", "月次売上の○%（売上連動）"],
                    ["返済開始", "開業翌月から即時"],
                    ["下方リスク", "売上が下がれば返済も自動で下がる"],
                    ["上方メリット", "売上が上振れれば投資家への返済も増加"],
                    ["GVAへのメリット", "固定返済なし・CF悪化時の負担軽減"],
                  ].map(([k,v]) => (
                    <div key={k} style={{ display:"flex", padding:"7px 0", borderBottom:`1px solid ${line}`, gap:12 }}>
                      <span style={{ fontSize:11, color:gray, minWidth:120 }}>{k}</span>
                      <span style={{ fontSize:11, color:"#1a1f2e", fontWeight:500 }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* ベースシナリオ返済試算 */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:navy, letterSpacing:"0.08em", marginBottom:12, paddingBottom:6, borderBottom:`2px solid ${navy}` }}>
                ベースシナリオ（月次売上¥500万）返済試算早見表
              </div>
              <table>
                <thead>
                  <tr>
                    <TH align="left">返済率</TH>
                    <TH>月次返済額</TH>
                    <TH>GVA手残りCF</TH>
                    <TH>投資家回収期間</TH>
                    <TH>36M累計</TH>
                    <TH>60M累計</TH>
                    <TH>判定</TH>
                  </tr>
                </thead>
                <tbody>
                  {REPAY_RATES.map((pct,i) => {
                    const bPL  = calcPL({ rev:5000, staffPerShift, partWage, managerCount, managerSalary, socialInsRate:0.15, utilities, otherFixed, royaltyRate });
                    const pay  = Math.round(5000 * pct / 100);
                    const net  = bPL.operatingProfit - pay;
                    const pb   = Math.ceil(INIT_K / pay);
                    const good = net >= 0 && pb <= 48;
                    const judge = !good ? (net<0?"❌ 赤字":"△ 長期") : pb<=36?"◎ 優良":"○ 可";
                    const jc    = net<0?red : pb<=36?green : pb<=48?"#b45309":gray;
                    return (
                      <tr key={pct} style={{ background: i%2===0?"#fff":"#f8f9fc" }}>
                        <TD align="left" bold><span style={{ color:navy }}>売上の{pct}%</span></TD>
                        <TD bold>{fM(pay)}</TD>
                        <TD color={net>=0?green:red} bold>{fM(net)}</TD>
                        <TD color={pb<=36?green:pb<=48?"#b45309":gray}>{pb < 999 ? `${pb}ヶ月` : "—"}</TD>
                        <TD>{fM(pay*36)}</TD>
                        <TD>{fM(pay*60)}</TD>
                        <TD color={jc} bold>{judge}</TD>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* リスク */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:navy, letterSpacing:"0.08em", marginBottom:12, paddingBottom:6, borderBottom:`2px solid ${navy}` }}>
                リスクと対応策
              </div>
              <table>
                <thead>
                  <tr>
                    <TH align="left" w="22%">リスク項目</TH>
                    <TH align="center" w="8%">深刻度</TH>
                    <TH align="left">対応策</TH>
                  </tr>
                </thead>

                      <div style={{ fontSize:11, fontWeight:700, color:gray, marginBottom:8 }}>このシナリオでの試算</div>
                      <table style={{ width:"100%" }}>
                        <tbody>
                          {[
                            ["営業利益/月", fM(p.operatingProfit), p.operatingProfit>=0?green:red],
                            ["営業利益率", fP(p.operatingMargin), p.operatingProfit>=0?green:red],
                            ["BEP達成率", fP(p.rev/p.bep), "#6d28d9"],
                            ["年間営業利益", fM(p.operatingProfit*12), p.operatingProfit>=0?green:red],
                            ["損益分岐点", fM(p.bep), gray],
                          ].map(([k,v,c]) => (
                            <tr key={k}>
                              <td style={{ padding:"5px 0", borderBottom:`1px solid ${line}`, fontSize:11, color:gray }}>{k}</td>
                              <td style={{ padding:"5px 0", borderBottom:`1px solid ${line}`, fontSize:13, fontWeight:700, color:c, textAlign:"right" }}>{v}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              );
            })}

            <div style={{ background:"#fffbeb", border:`1px solid #fcd34d`, padding:"14px 18px" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#92400e", marginBottom:8 }}>★ 修正済みコスト前提について</div>
              <table style={{ width:"100%" }}>
                <tbody>
                  {[
                    ["水道光熱費（17.5万/月）", "24h年中無休・シーシャ炭火使用・沖縄高温環境（冷房強化）を実態反映。旧設定10万から修正。"],
                    ["その他固定費（25万/月）", "消耗品・シーシャ機材メンテ・ゴミ処理・損害保険等の実態値。旧設定5万から修正。"],
                    ["施工期間家賃（52.5万）", "内装施工1.5ヶ月分を初期投資に計上済み（35万×1.5）。旧試算に未計上だったものを追加。"],
                  ].map(([k,v]) => (
                    <tr key={k}>
                      <td style={{ padding:"6px 0", borderBottom:`1px solid #fde68a`, fontSize:11, fontWeight:700, color:"#92400e", width:"28%", paddingRight:12 }}>{k}</td>
                      <td style={{ padding:"6px 0", borderBottom:`1px solid #fde68a`, fontSize:11, color:"#78350f" }}>{v}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {/* フッター */}
      <div style={{ borderTop:`1px solid ${line}`, padding:"12px 36px", background:"#fff",
        display:"flex", justifyContent:"space-between", fontSize:10, color:gray, marginTop:20 }}>
        <span>株式会社GOOD VIBES AGENCY　｜　CA6DEN 沖縄出店 投資家向けシミュレーション</span>
        <span>本資料は投資検討用です。将来の収益を保証するものではありません。</span>
      </div>
    </div>
  );
}
